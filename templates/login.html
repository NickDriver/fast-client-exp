{% extends "layouts/base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="flex min-h-screen items-center justify-center">
    <div class="w-full max-w-md">
        <h1 class="text-center text-3xl font-bold text-gray-900 dark:text-warm-100">FastClient</h1>
        <h2 class="mt-2 text-center text-lg text-gray-600 dark:text-warm-400">Sign in</h2>

        <div class="mt-8 p-8 bg-white dark:bg-warm-800 rounded-xl shadow-lg">
            {% if error.is_some() %}
            <div class="mb-4 p-4 rounded-lg bg-red-50 dark:bg-red-900/30 text-sm text-red-800 dark:text-red-300">
                {{ error.as_ref().unwrap() }}
            </div>
            {% endif %}

            <form action="/login" method="post" class="space-y-6">
                <input type="hidden" name="_csrf" value="{{ csrf_token }}">
                
                <div>
                    <label for="email" class="form-label">Email</label>
                    <input type="email" name="email" id="email" class="form-input" required>
                </div>

                <div>
                    <label for="password" class="form-label">Password</label>
                    <input type="password" name="password" id="password" class="form-input" required>
                </div>

                <button type="submit" class="btn btn-primary w-full">Sign in</button>
            </form>

            <p class="mt-6 text-center text-sm text-gray-600 dark:text-warm-400">
                <a href="/register" class="text-blue-600 hover:text-blue-500">Create account</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
